# wrangler.toml — Cloudflare Static Assets Deployment Configuration

name = "primitive-shield"
compatibility_date = "2026-05-17"

# Serve the compiled React frontend statically from the ./dist directory.
# This prevents Wrangler from trying to compile the Node/Express backend (server.ts),
# completely resolving the 130+ Node.js V8 compatibility and compilation errors.
assets = { directory = "./dist" }

# CRITICAL SECURITY: Explicitly disable the default *.workers.dev preview subdomain.
# This prevents the app from being accessed on public Cloudflare preview URLs.
workers_dev = false

# Route configuration — lock application strictly to the custom domain.
[[routes]]
pattern = "shield.primitive.org"
custom_domain = true
